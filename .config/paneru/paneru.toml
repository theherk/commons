[options]
animation_speed = 6666
auto_center = true
focus_follows_mouse = true
mouse_follows_focus = true
preset_column_widths = [0.44, 0.66, 0.75, 1.0]

[bindings]
window_focus_west = "alt - h"
window_focus_east = "alt - l"
window_focus_first = "alt + shift - h"
window_focus_last = "alt + shift - l"
window_focus_north = "alt - k"
window_focus_south = "alt - j"
window_swap_west = "alt + ctrl - h"
window_swap_east = "alt + ctrl - l"
window_swap_first = "alt + ctrl + shift - h"
window_swap_last = "alt + ctrl + shift - l"
window_center = "alt - c"
window_resize = "alt - r"
window_shrink = "alt + shift - r"
window_fullwidth = "alt - f"
window_manage = "alt - t"
window_stack = "alt - s"
window_unstack = "alt + shift - s"
window_equalize = "alt - e"
window_nextdisplay = "alt + ctrl - n"
quit = "ctrl + alt - q"

# Browsers (index 10-19)
[windows.zen]
title = ".*"
bundle_id = "app.zen-browser.zen"
index = 10
width = 1.0

[windows.orion]
title = "Orion.*"
bundle_id = "com.kagi.kagimacOS"
index = 11
width = 1.0

