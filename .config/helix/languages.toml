[[language]]
name = "python"
auto-format = true
formatter = { command = "black", args = ["-", "-q"] }

[language-server.mpls]
command = "mpls"
args = ["--theme", "dark", "--code-style", "catppuccin-frappe", "--enable-emoji", "--enable-footnotes"]

[[language]]
name = "markdown"
language-servers = ["mpls"]
